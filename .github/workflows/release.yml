name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    {}

jobs:
  release:
    runs-on: ubuntu-latest
    # BẮT BUỘC: Cấp đủ quyền cho cả việc sinh OIDC token (npm) và tạo Release (GitHub)
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cài đặt dependencies
        run: bun install

      - name: Build hive-core
        working-directory: packages/hive-core
        run: bun run build

      - name: Reinstall to link workspace packages
        run: bun install

      - name: Build opencode-hive
        working-directory: packages/opencode-hive
        run: bun run build

      - name: Test hive-core
        working-directory: packages/hive-core
        run: bun test

      - name: Test opencode-hive
        working-directory: packages/opencode-hive
        run: bun test

      # --- TIẾN HÀNH PUBLISH LÊN NPM (Chỉ chạy khi có push tag v*) ---
      - name: Cài đặt Node.js (Để dùng npm chính chủ xác thực OIDC)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Đẩy gói lên NPM Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/opencode-hive
        run: |
          npm install -g npm@latest
          npm publish --access public --provenance

      # --- TẠO GITHUB RELEASE ---
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
